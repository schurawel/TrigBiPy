name: Build LaTeX PDF & Create Release

on:
  push:
    branches:
      - main  # Oder dein Hauptzweig (z. B. master)

permissions:
  contents: write  # ZWINGEND ERFORDERLICH, damit die Action ein Release erstellen darf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex
          args: -pdf -interaction=nonstopmode -halt-on-error

      # Schritt 1: PDF in den gewünschten Namen umbenennen
      - name: Rename PDF file
        run: mv paper.pdf incoherence_is_all_you_need.pdf

      # Schritt 2: Das GitHub Release erstellen und die Datei anhängen
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: incoherence_is_all_you_need.pdf
